name: First Github Action 

on: push
jobs: 
  hello_world:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup=node@v4
        with:
          node-version: 16
          
      - name: Ejecutar index.js
        run: node index.js